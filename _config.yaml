defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: en
  - scope:
      path: ja
    values:
      lang: ja
  - scope:
      path: pt
    values:
      lang: pt

encoding: utf-8

exclude:
  - .github
  - .gitignore
  - CNAME
  - README.md

url: https://joaopenteado.com

sass:
    style: compressed

permalink: :path/:basename

plugins:
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
