defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: en-US
  - scope:
      path: ja
    values:
      lang: ja-JP
  - scope:
      path: pt
    values:
      lang: pt-BR

encoding: utf-8

exclude:
  - .github
  - .gitignore
  - CNAME
  - README.md

plugins:
  - jekyll-optional-front-matter
